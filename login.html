<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Comunidad - Acceso</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="background-animation"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <!-- Logo en el login -->
                <img src="img/logo.png" alt="Logo" class="auth-logo">
                <h2 id="formTitle">Iniciar Sesión</h2>
                <p id="formSubtitle">Bienvenido de vuelta a la comunidad</p>
            </div>

            <div class="auth-body">
                <!-- Formulario de Login -->
                <form id="loginForm" class="auth-form active">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Contraseña" required>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox"> Recordarme
                        </label>
                        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>
                    <button type="submit" class="btn-auth">
                        <i class="fas fa-sign-in-alt"></i>
                        Iniciar Sesión
                    </button>
                </form>

                <!-- Formulario de Registro -->
                <form id="signupForm" class="auth-form">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupName" placeholder="Nombre completo" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="Correo electrónico" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="Contraseña" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupConfirmPassword" placeholder="Confirmar contraseña" required>
                    </div>
                    <button type="submit" class="btn-auth">
                        <i class="fas fa-user-plus"></i>
                        Registrarse
                    </button>
                </form>

                <div class="social-login">
                    <p>O continúa con</p>
                    <div class="social-buttons">
                        <button class="btn-social gmail" id="gmailLogin">
                            <i class="fab fa-google"></i>
                            Gmail
                        </button>
                        <button class="btn-social facebook" id="facebookLogin">
                            <i class="fab fa-facebook-f"></i>
                            Facebook
                        </button>
                    </div>
                </div>

                <div class="auth-toggle">
                    <p id="toggleMessage">¿No tienes una cuenta?</p>
                    <button id="toggleAuth" class="btn-toggle">
                        Crear cuenta nueva
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
